<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="VisionGuard51 system overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.6" stop-color="#0B1024"/>
      <stop offset="1" stop-color="#08111B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C1422"/>
      <stop offset="1" stop-color="#0A1320"/>
    </linearGradient>
    <linearGradient id="accentTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27E0C6" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#27E0C6" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="accentAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB84D" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFB84D" stop-opacity="0.1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7FA0BA"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <g transform="translate(86 88)">
    <text x="0" y="0"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="44" font-weight="800" fill="#E9F6FF">System Overview</text>
    <text x="0" y="44"
      font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="18" font-weight="600" fill="#A9C2D6">VisionGuard51 data flow from sensor ’ inference ’ decision ’ actuation ’ remote ops</text>
  </g>

  <!-- Cards -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
    <!-- Camera -->
    <g transform="translate(110 210)" filter="url(#shadow)">
      <rect width="330" height="150" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="330" height="6" rx="3" fill="url(#accentTeal)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">Camera</text>
      <text x="26" y="84" font-size="16" font-weight="600" fill="#A9C2D6">OpenCV capture (USB / laptop cam)</text>
      <text x="26" y="112" font-size="14" font-weight="600" fill="#8AA6BE">Frames ’ inference pipeline</text>
    </g>

    <!-- YOLO -->
    <g transform="translate(520 190)" filter="url(#shadow)">
      <rect width="420" height="190" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="420" height="6" rx="3" fill="url(#accentTeal)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">YOLOv8 Detection</text>
      <text x="26" y="86" font-size="16" font-weight="700" fill="#A9C2D6">Humans + Faces</text>
      <text x="26" y="116" font-size="14" font-weight="600" fill="#8AA6BE">- Person model: <tspan fill="#CFE6F7" font-weight="700">yolov8n.pt</tspan></text>
      <text x="26" y="142" font-size="14" font-weight="600" fill="#8AA6BE">- Face model: <tspan fill="#CFE6F7" font-weight="700">yolov8n-face.pt</tspan></text>
      <text x="26" y="168" font-size="14" font-weight="600" fill="#8AA6BE">Boxes + target centerpoints</text>
    </g>

    <!-- DeepFace -->
    <g transform="translate(1020 210)" filter="url(#shadow)">
      <rect width="460" height="150" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="460" height="6" rx="3" fill="url(#accentAmber)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">DeepFace Authorization</text>
      <text x="26" y="84" font-size="16" font-weight="600" fill="#A9C2D6">ArcFace verify/find against <tspan fill="#CFE6F7" font-weight="700">authorized_db/</tspan></text>
      <text x="26" y="112" font-size="14" font-weight="600" fill="#8AA6BE">Throttle + enrollment-friendly pipeline</text>
    </g>

    <!-- Decision -->
    <g transform="translate(520 435)" filter="url(#shadow)">
      <rect width="420" height="170" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="420" height="6" rx="3" fill="url(#accentAmber)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">Decision Layer</text>
      <text x="26" y="86" font-size="16" font-weight="700" fill="#A9C2D6">Modes</text>
      <text x="26" y="114" font-size="14" font-weight="600" fill="#8AA6BE">- Semi-auto: user approves fire</text>
      <text x="26" y="140" font-size="14" font-weight="600" fill="#8AA6BE">- Full auto: autonomous engage</text>
    </g>

    <!-- Arduino -->
    <g transform="translate(110 470)" filter="url(#shadow)">
      <rect width="330" height="190" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="330" height="6" rx="3" fill="url(#accentTeal)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">Arduino Control</text>
      <text x="26" y="84" font-size="16" font-weight="600" fill="#A9C2D6">Serial commands (e.g. COM7)</text>
      <text x="26" y="112" font-size="14" font-weight="600" fill="#8AA6BE">Servos " sensors " safety gates</text>
      <text x="26" y="138" font-size="14" font-weight="600" fill="#8AA6BE">Actuation from target coordinates</text>
      <text x="26" y="164" font-size="14" font-weight="600" fill="#8AA6BE">Optional ESP32 relay</text>
    </g>

    <!-- Dashboard -->
    <g transform="translate(1020 435)" filter="url(#shadow)">
      <rect width="460" height="190" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="460" height="6" rx="3" fill="url(#accentTeal)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">Web Dashboard</text>
      <text x="26" y="84" font-size="16" font-weight="600" fill="#A9C2D6">Flask + Socket.IO</text>
      <text x="26" y="112" font-size="14" font-weight="600" fill="#8AA6BE">Live MJPEG feed " status " commands</text>
      <text x="26" y="138" font-size="14" font-weight="600" fill="#8AA6BE">Local: <tspan fill="#CFE6F7" font-weight="700">http://localhost:5000</tspan></text>
      <text x="26" y="164" font-size="14" font-weight="600" fill="#8AA6BE">Remote LAN: host 0.0.0.0</text>
    </g>

    <!-- Telegram -->
    <g transform="translate(520 670)" filter="url(#shadow)">
      <rect width="960" height="150" rx="22" fill="url(#card)" stroke="#22354B"/>
      <rect x="0" y="0" width="960" height="6" rx="3" fill="url(#accentAmber)"/>
      <text x="26" y="54" font-size="22" font-weight="800" fill="#E9F6FF">Alerts + Evidence</text>
      <text x="26" y="84" font-size="16" font-weight="600" fill="#A9C2D6">Telegram messages + photo alerts for unauthorized detections</text>
      <text x="26" y="112" font-size="14" font-weight="600" fill="#8AA6BE">Tip: keep tokens out of git (use env vars / .env)</text>
    </g>
  </g>

  <!-- Connectors -->
  <g fill="none" stroke="#7FA0BA" stroke-width="3" opacity="0.9" marker-end="url(#arrow)">
    <path d="M440 285 C480 285 490 285 520 285"/>
    <path d="M940 285 C980 285 990 285 1020 285"/>
    <path d="M730 380 C730 410 730 415 730 435"/>
    <path d="M520 520 C470 520 460 520 440 540"/>
    <path d="M940 520 C980 520 990 520 1020 530"/>
    <path d="M730 605 C730 645 730 650 730 670"/>
    <path d="M330 560 C420 640 470 690 520 720"/>
    <path d="M1250 560 C1160 640 1110 690 1040 720"/>
  </g>

  <!-- Legend -->
  <g transform="translate(86 822)">
    <rect x="0" y="0" width="520" height="56" rx="16" fill="#0C1422" stroke="#22354B" opacity="0.95"/>
    <circle cx="28" cy="28" r="7" fill="#27E0C6"/>
    <text x="44" y="33" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="14" font-weight="700" fill="#A9C2D6">Inference / transport</text>
    <circle cx="210" cy="28" r="7" fill="#FFB84D"/>
    <text x="226" y="33" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="14" font-weight="700" fill="#A9C2D6">Decision / alerts</text>
    <text x="382" y="33" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
      font-size="14" font-weight="700" fill="#8AA6BE">All visuals are schematic</text>
  </g>
</svg>
